  FLYWAY_URL: "jdbc:mysql://mysql-service:3306/switching_db?useSSL=true&requireSSL=true&serverTimezone=Asia/Bangkok"
  FLYWAY_USERNAME: "switching_flyway"
  FLYWAY_PASSWORD: "REPLACE_ME"
  MESSAGE_CRYPTO_KEY_BASE64: "REPLACE_ME"

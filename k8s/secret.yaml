apiVersion: v1
kind: Secret
metadata:
  name: switching-secrets
  namespace: switching
type: Opaque
# IMPORTANT: Replace all values with base64-encoded production secrets before applying.
# Generate: echo -n 'value' | base64
stringData:
  DB_URL: "jdbc:mysql://mysql-service:3306/switching_db?useSSL=true&requireSSL=true&serverTimezone=Asia/Bangkok"
  DB_USERNAME: "switching_app"

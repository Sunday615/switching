spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/switching_db?useSSL=false&serverTimezone=Asia/Bangkok&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:REMOVED}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}

  flyway:
    enabled: true
    locations: classpath:db/migration
    url: ${DB_URL:jdbc:mysql://localhost:3306/switching_db?useSSL=false&serverTimezone=Asia/Bangkok&allowPublicKeyRetrieval=true}
    user: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:REMOVED}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

switching:
  payment:
    json-initiation:
      enabled: false
  mock-bank:
    pacs002:
      force-reject: ${MOCK_BANK_FORCE_REJECT:false}



  security:
    message-crypto-key-base64: ${MESSAGE_CRYPTO_KEY_BASE64:}